<script>
  // Keep in sync with tex/macros.tex (PDF path).
  window.katexMacros = {
    "\\E": "\\mathbb{E}",
    "\\Ex": "\\operatorname{E}",
    "\\var": "\\operatorname{Var}",
    "\\cov": "\\operatorname{Cov}",
    "\\imp": "\\Rightarrow",
    "\\argmax": "\\operatorname*{arg\\,max}",
    "\\argmin": "\\operatorname*{arg\\,min}",
    "\\norm": "\\left\\lVert#1\\right\\rVert",
    "\\vect": "\\mathbf{#1}",
    "\\matr": "\\mathbf{#1}",
    "\\R": "\\mathbb{R}",
    "\\dd": "\\mathrm{d}",
    "\\loss": "\\mathcal{L}"
  };
  document.addEventListener("DOMContentLoaded", function () {
    if (window.renderMathInElement) return; // quarto handles rendering; macros picked up below
  });
</script>
<script>
  // Quarto calls renderMathInElement with its own options; merge our macros in.
  (function () {
    var patch = function () {
      if (!window.renderMathInElement) return false;
      var orig = window.renderMathInElement;
      window.renderMathInElement = function (el, opts) {
        opts = opts || {};
        opts.macros = Object.assign({}, window.katexMacros, opts.macros || {});
        return orig(el, opts);
      };
      return true;
    };
    if (!patch()) document.addEventListener("DOMContentLoaded", patch);
  })();
</script>
