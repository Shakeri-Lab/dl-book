name: Render and Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true
        env:
          # Authenticated API calls — avoids rate-limit failures resolving tinytex releases
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Needed even with `freeze: true` — belt and suspenders for any
      # chapter accidentally committed without a freeze cache.
      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Render (HTML + PDF)
        run: quarto render

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  link-check:
    runs-on: ubuntu-latest
    needs: build-deploy
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Check links in sources
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --accept 200,201,202,204,206,301,302,303,307,308,403,429 chapters/ index.qmd README.md
          fail: false
