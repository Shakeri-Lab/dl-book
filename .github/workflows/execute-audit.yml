name: Execution Audit

# The book's covenant: every printed snippet is the executed artifact.
# This job enforces it mechanically — a full from-scratch re-execution of every
# notebook cell (freeze caches deleted), independent of the publish pipeline.
# Publishing still uses committed freeze results; this audit catches drift
# between source and results before it can mislead a reader.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC

permissions:
  contents: read

jobs:
  execute-all:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Re-execute every cell from scratch
        run: |
          rm -rf _freeze
          quarto render --to html

      - name: Report
        if: success()
        run: echo "All notebook cells executed cleanly from scratch."
