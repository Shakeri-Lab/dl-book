project:
  type: book
  output-dir: _book

book:
  title: "Deep Learning: Making It Learnable"
  subtitle: "A course companion in native Python and PyTorch"
  author: "Heman Shakeri"
  date: today
  repo-url: https://github.com/Shakeri-Lab/dl-book
  repo-actions: [issue]
  site-url: https://shakeri-lab.github.io/dl-book/
  sidebar:
    style: docked
    search: true
  page-footer:
    left: >
      © Heman Shakeri · Text CC BY-NC-SA 4.0 · Code MIT ·
      School of Data Science, University of Virginia
    right: >
      Companion to [DS 6050 Deep Learning](https://shakeri-lab.github.io/dl-course-site/)
  chapters:
    - index.qmd
    - part: "I · From Lines to Networks"
      chapters:
        - chapters/part1/01-linear-regression.qmd
        - chapters/part1/02-logistic-softmax.qmd
        - chapters/part1/03-nonlinearity-mlp.qmd
        - chapters/part1/04-training-loss-sgd.qmd
        - chapters/part1/05-backpropagation.qmd
        - chapters/part1/06-generalization-inductive-bias.qmd
    - part: "II · Vision: Learning the Filters"
      chapters:
        - chapters/part2/07-filters-convolution.qmd
        - chapters/part2/08-cnn.qmd
        - chapters/part2/09-modern-cnns-transfer.qmd
    - part: "III · Sequences"
      chapters:
        - chapters/part3/10-sequences-rnn.qmd
        - chapters/part3/11-encoder-decoder.qmd
    - part: "IV · Attention: Learning the Similarity"
      chapters:
        - chapters/part4/12-kernel-regression.qmd
        - chapters/part4/13-attention.qmd
        - chapters/part4/14-self-attention-transformer.qmd
        - chapters/part4/15-bert-pretraining.qmd
        - chapters/part4/16-vit-scaling.qmd
    - part: "V · The Pretrained Era"
      chapters:
        - chapters/part5/17-peft-quantization.qmd
        - chapters/part5/18-alignment.qmd
        - chapters/part5/19-generative.qmd
  appendices:
    - chapters/appendices/a1-linear-algebra.qmd
    - chapters/appendices/a2-tensors.qmd
    - chapters/appendices/a3-precision-performance.qmd
    - chapters/appendices/a4-notation.qmd

execute:
  freeze: true
  warning: false

filters:
  - path: filters/pdf-chapter-xrefs.lua
    at: pre-quarto

format:
  html:
    theme: [cosmo, dlbook.scss]
    html-math-method: mathjax
    include-in-header: mathjax-config.html
    code-link: true
    code-copy: true
    code-fold: true
    code-summary: "Code"
    toc: true
    toc-depth: 3
    number-depth: 2
  pdf:
    documentclass: scrbook
    include-in-header: tex/macros.tex
    toc: true
    number-sections: true
    colorlinks: true
    geometry:
      - margin=1.1in
